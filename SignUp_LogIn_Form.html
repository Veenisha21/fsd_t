<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login/Signup Form</title>
  <link rel="stylesheet" href="SignUp_LogIn_Form.css"/>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'/>
</head>
<body>
  <div class="language-selector">
    <label for="language">🌐 Language:</label>
    <select id="language">
      <option value="en">English</option>
      <option value="hi">हिन्दी</option>
    </select>
  </div>

  <div class="container">
    <div class="form-box login">
      <form action="#">
        <h1 data-lang="login-title">Login</h1>
        <div class="input-box">
          <input type="text" placeholder="Username" required />
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required />
          <i class='bx bxs-lock-alt'></i>
        </div>
        <div class="forgot-link">
          <a href="#" data-lang="forgot">Forgot Password?</a>
        </div>
        <button type="submit" class="btn" data-lang="login-btn">Login</button>
        <p data-lang="login-social">or login with social platforms</p>
        <div class="social-icons">
          <a href="#"><i class='bx bxl-google'></i></a>
          <a href="#"><i class='bx bxl-facebook'></i></a>
          <a href="#"><i class='bx bxl-github'></i></a>
          <a href="#"><i class='bx bxl-linkedin'></i></a>
        </div>
      </form>
    </div>

    <div class="form-box register">
      <form action="#">
        <h1 data-lang="register-title">Registration</h1>
        <div class="input-box">
          <input type="text" placeholder="Username" required />
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="email" placeholder="Email" required />
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required />
          <i class='bx bxs-lock-alt'></i>
        </div>
        <button type="submit" class="btn" data-lang="register-btn">Register</button>
        <p data-lang="register-social">or register with social platforms</p>
        <div class="social-icons">
          <a href="#"><i class='bx bxl-google'></i></a>
          <a href="#"><i class='bx bxl-facebook'></i></a>
          <a href="#"><i class='bx bxl-github'></i></a>
          <a href="#"><i class='bx bxl-linkedin'></i></a>
        </div>
      </form>
    </div>

    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1 data-lang="welcome">AI-Powered personalized learning path generator!</h1>
        <p data-lang="no-account">Don't have an account?</p>
        <button class="btn register-btn" data-lang="register-toggle">Register</button>
      </div>

      <div class="toggle-panel toggle-right">
        <h1 data-lang="welcome-back">Unlock your personalized learning journey with AI!</h1>
        <p data-lang="have-account">Already have an account?</p>
        <button class="btn login-btn" data-lang="login-toggle">Login</button>
      </div>
    </div>
  </div>

  <script src="SignUp_LogIn_Form.js"></script>
</body>
</html>
